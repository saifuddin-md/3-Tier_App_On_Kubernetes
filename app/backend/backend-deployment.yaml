apiVersion: apps/v1
kind: Deployment
metadata:
  name: rr-backend-deployment
  namespace: rr-app
  labels:
    app: backend
    env: development
  annotations:
    kubernetes.io/change-cause: "Initial release with rr-backend:p1"
spec:
  replicas: 1
  revisionHistoryLimit: 10           # old replicasets kept for rollback (default: 10)
  minReadySeconds: 5                 # seconds pods must be ready before counted avilable (default:0)
  progressDeadlinesSeconds: 300      # mark rollout stalled after N seconds (default: 600)

  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1                    # allow 1 extra pod during update. (default is 25 %)
      maxUnavailable: 0              # keep all existing pods available. (default is 25%)

  template:
    metadata:
      labels:
        app: backend
        environment: development

    spec:
      containers:
      - name: rr-backend-container
        image: xrootms/rr-backend:p1
        imagePullPolicy: Always

        ports:
        - containerPort: 5001

        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: MONGO_URI

        - name: RESTREVIEWS_NS
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: RESTREVIEWS_NS

---
apiVersion: v1
kind: Service
metadata:
  name: rr-backend-service

spec:
  type: ClusterIP   
  selector:
    app: backend
  ports:
  - port: 5001
    targetPort: 5001
